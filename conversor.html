<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades</title>
    <style>
        :root {
            --primary: #0ea5e9; /* Light blue accent */
            --primary-dark: #0284c7;
            --secondary: #10b981; /* Green accent */
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 2rem 1rem;
            align-items: center;
        }

        .back-link {
            align-self: flex-start;
            max-width: 800px;
            width: 100%;
            margin: 0 auto 1.5rem auto;
            color: var(--text-light);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-dark);
        }

        .ad-space {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #cbd5e1;
            background-color: #f1f5f9;
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
            margin: 1rem auto;
            border-radius: 8px;
            text-align: center;
        }

        .ad-horizontal {
            width: 100%;
            max-width: 728px;
            height: 90px;
        }

        .ad-square {
            width: 100%;
            max-width: 300px;
            height: 250px;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            margin-top: 1.5rem;
        }

        h1 {
            color: var(--text-main);
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 1.125rem;
        }

        .converter-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 650px;
            margin: 0 auto 2.5rem auto;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: var(--surface);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        input[readonly] {
            background-color: #f8fafc;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 1.25rem;
            border-color: var(--border);
        }

        /* Ocultar flechas del input number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .converter-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .converter-row {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .converter-col {
            flex: 1;
            min-width: 0; /* Prevents flex items from overflowing */
        }

        .swap-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -0.5rem 0;
            z-index: 10;
        }

        .swap-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-light);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .swap-btn:hover {
            color: var(--secondary);
            border-color: var(--secondary);
            transform: scale(1.1);
            background: #f0fdf4;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.1);
        }

        .swap-btn:active {
            transform: scale(0.95);
        }

        .swap-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s;
        }

        /* En Desktop mostramos flechas arriba/abajo si apilamos todo pero al final el diseño tiene de/a a los lados no funciona así.
           Mejor lo ponemos en columnas horizontales de: input + select */

        .input-select-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (max-width: 600px) {
            .converter-card {
                padding: 1.5rem;
            }

            .converter-row {
                flex-direction: column;
                gap: 1.5rem;
            }

            .swap-container {
                margin: 0.5rem 0;
            }

            .swap-btn {
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(90deg) scale(1.1);
            }
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding-top: 3rem;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--primary-dark);
            text-decoration: none;
            margin: 0 0.5rem;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Volver a la página principal
    </a>

    <!-- Espacio publicitario superior -->
    <div class="ad-space ad-horizontal">
        Anuncio (728x90)
    </div>

    <header>
        <h1>Conversor de Unidades</h1>
        <p class="subtitle">Longitud, peso, volumen y temperatura</p>
    </header>

    <main class="converter-card">
        <!-- Selector de Categoría -->
        <div class="form-group">
            <label for="category">Categoría</label>
            <select id="category">
                <option value="longitud">📏 Longitud</option>
                <option value="peso">⚖️ Peso / Masa</option>
                <option value="volumen">💧 Volumen</option>
                <option value="temperatura">🌡️ Temperatura</option>
            </select>
        </div>

        <div class="converter-container">
            <!-- Origen -->
            <div class="converter-row">
                <div class="converter-col input-select-group">
                    <label for="amount">Cantidad</label>
                    <input type="number" id="amount" value="1" step="any" placeholder="Ingresa cantidad">
                </div>
                <div class="converter-col input-select-group">
                    <label for="unit-from">De:</label>
                    <select id="unit-from"></select>
                </div>
            </div>

            <!-- Botón Intercambiar -->
            <div class="swap-container">
                <button class="swap-btn" id="swap-btn" aria-label="Intercambiar unidades" title="Intercambiar">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 10h14l-4-4"></path>
                        <path d="M17 14H3l4 4"></path>
                    </svg>
                </button>
            </div>

            <!-- Destino -->
            <div class="converter-row">
                <div class="converter-col input-select-group">
                    <label for="result">Resultado</label>
                    <input type="text" id="result" readonly placeholder="0">
                </div>
                <div class="converter-col input-select-group">
                    <label for="unit-to">A:</label>
                    <select id="unit-to"></select>
                </div>
            </div>
        </div>
    </main>

    <!-- Espacio publicitario inferior -->
    <div class="ad-space ad-square">
        Anuncio (300x250)
    </div>

    <footer>
        <p>&copy; 2026 Herramientas Gratuitas. Todos los derechos reservados.</p>
        <p style="margin-top: 0.5rem;">
            <a href="#">Política de Privacidad</a> | 
            <a href="#">Términos de Condiciones</a> | 
            <a href="#">Contacto</a>
        </p>
    </footer>

    <script>
        // Base de datos de unidades
        // Longitud base: Metro (m)
        // Peso base: Gramo (g)
        // Volumen base: Litro (l)
        const unitsData = {
            longitud: {
                mm: { name: 'Milímetro (mm)', factor: 0.001 },
                cm: { name: 'Centímetro (cm)', factor: 0.01 },
                m: { name: 'Metro (m)', factor: 1 },
                km: { name: 'Kilómetro (km)', factor: 1000 },
                in: { name: 'Pulgada (in)', factor: 0.0254 },
                ft: { name: 'Pie (ft)', factor: 0.3048 },
                yd: { name: 'Yarda (yd)', factor: 0.9144 },
                mi: { name: 'Milla (mi)', factor: 1609.344 }
            },
            peso: {
                mg: { name: 'Miligramo (mg)', factor: 0.001 },
                g: { name: 'Gramo (g)', factor: 1 },
                kg: { name: 'Kilogramo (kg)', factor: 1000 },
                t: { name: 'Tonelada (t)', factor: 1000000 },
                oz: { name: 'Onza (oz)', factor: 28.349523125 },
                lb: { name: 'Libra (lb)', factor: 453.59237 }
            },
            volumen: {
                ml: { name: 'Mililitro (ml)', factor: 0.001 },
                l: { name: 'Litro (l)', factor: 1 },
                m3: { name: 'Metro cúbico (m³)', factor: 1000 },
                gal: { name: 'Galón (gal)', factor: 3.785411784 },
                pt: { name: 'Pinta (pt)', factor: 0.473176473 },
                cup: { name: 'Taza (cup)', factor: 0.24 } // Taza métrica es 0.25, legal US 0.24
            },
            temperatura: {
                c: { name: 'Celsius (°C)' },
                f: { name: 'Fahrenheit (°F)' },
                k: { name: 'Kelvin (K)' }
            }
        };

        // Elementos del DOM
        const categorySelect = document.getElementById('category');
        const amountInput = document.getElementById('amount');
        const resultInput = document.getElementById('result');
        const unitFromSelect = document.getElementById('unit-from');
        const unitToSelect = document.getElementById('unit-to');
        const swapBtn = document.getElementById('swap-btn');

        // Función para cargar los selectores de unidades según la categoría
        function populateUnits(keepSelections = false) {
            const category = categorySelect.value;
            const units = unitsData[category];
            
            const oldFrom = unitFromSelect.value;
            const oldTo = unitToSelect.value;

            unitFromSelect.innerHTML = '';
            unitToSelect.innerHTML = '';

            let firstUnit = '';
            let secondUnit = '';
            let isFirst = true;

            for (const [key, unit] of Object.entries(units)) {
                if (isFirst) {
                    firstUnit = key;
                    isFirst = false;
                }
                // Guardar la segunda unidad para ponerla por defecto en el destino
                if (Object.keys(units)[1] === key) {
                    secondUnit = key;
                }

                const option1 = document.createElement('option');
                option1.value = key;
                option1.textContent = unit.name;
                unitFromSelect.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = key;
                option2.textContent = unit.name;
                unitToSelect.appendChild(option2);
            }

            // Restaurar valores si existían y se está recargando (opcional)
            if (keepSelections && units[oldFrom] && units[oldTo]) {
                unitFromSelect.value = oldFrom;
                unitToSelect.value = oldTo;
            } else {
                // Valores por defecto
                if (firstUnit) unitFromSelect.value = firstUnit;
                if (secondUnit) unitToSelect.value = secondUnit;
                else if (firstUnit) unitToSelect.value = firstUnit;
                
                // Excepción para temperatura para dejar C -> F por defecto
                if (category === 'temperatura') {
                    unitFromSelect.value = 'c';
                    unitToSelect.value = 'f';
                }
            }

            calculate();
        }

        // Lógica de conversión de temperatura
        function convertTemperature(value, from, to) {
            if (from === to) return value;
            
            let celsius;
            // Convertir de Origen -> Celsius
            if (from === 'c') celsius = value;
            else if (from === 'f') celsius = (value - 32) * 5/9;
            else if (from === 'k') celsius = value - 273.15;

            // Convertir de Celsius -> Destino
            if (to === 'c') return celsius;
            if (to === 'f') return (celsius * 9/5) + 32;
            if (to === 'k') return celsius + 273.15;
            
            return 0;
        }

        // Calcular conversión
        function calculate() {
            const category = categorySelect.value;
            const amount = parseFloat(amountInput.value);
            const from = unitFromSelect.value;
            const to = unitToSelect.value;

            // Validar entrada
            if (isNaN(amount)) {
                resultInput.value = '';
                return;
            }

            let result = 0;

            if (category === 'temperatura') {
                result = convertTemperature(amount, from, to);
            } else {
                // Cálculo mediante factor base
                const factorFrom = unitsData[category][from].factor;
                const factorTo = unitsData[category][to].factor;
                
                // Cantidad en la unidad base (ej: metros, gramos, litros)
                const valueInBase = amount * factorFrom;
                // Cantidad en la unidad destino
                result = valueInBase / factorTo;
            }

            // Formateo del resultado
            if (Math.abs(result) > 1e10 || (Math.abs(result) < 1e-6 && result !== 0)) {
                // Notación científica para números muy pequeños o muy grandes
                resultInput.value = result.toExponential(4);
            } else {
                // Redondear hasta 6 decimales para evitar problemas de precisión JS
                // quita los ceros a la derecha innecesarios
                resultInput.value = parseFloat(result.toFixed(6));
            }
        }

        // Intercambiar unidades y recalcular
        function swapUnits() {
            const fromValue = unitFromSelect.value;
            unitFromSelect.value = unitToSelect.value;
            unitToSelect.value = fromValue;
            
            // Efecto visual en el botón
            swapBtn.style.transform = 'rotate(180deg)';
            setTimeout(() => {
                swapBtn.style.transition = 'none';
                swapBtn.style.transform = 'rotate(0deg)';
                setTimeout(() => swapBtn.style.transition = 'all 0.2s ease', 10);
            }, 200);

            calculate();
        }

        // Asignar los eventos
        categorySelect.addEventListener('change', () => populateUnits(false));
        amountInput.addEventListener('input', calculate);
        unitFromSelect.addEventListener('change', calculate);
        unitToSelect.addEventListener('change', calculate);
        swapBtn.addEventListener('click', swapUnits);

        // Llamada inicial para cargar el estado
        populateUnits();
    </script>
</body>
</html>
